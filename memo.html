<style>

/* 
body{
    background:#111;
    color:#fff;
    font-family:sans-serif;
} */


/* ======================
   パーティ
====================== */

.party-panel{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.actor-card{
    display:flex;
    gap:10px;

    padding:10px;

    border:1px solid #444;
    border-radius:12px;

    background:#1b1b1b;
}

.portrait{
    width:64px;
    height:64px;

    border-radius:8px;
    background:#444;
}

.actor-info{
    flex:1;
}

.job{
    display:inline-block;

    width:28px;
    text-align:center;

    border-radius:6px;

    font-weight:bold;
    margin-right:4px;
}

.warrior{background:#c0392b;}
.priest{background:#27ae60;}
.mage{background:#8e44ad;}
.thief{background:#f39c12;}

.level{
    color:#ccc;
}

.status-row{
    margin-top:6px;
}

.status-row label{
    display:block;
    font-size:12px;
    margin-bottom:2px;
}

.bar{
    height:8px;
    border-radius:99px;
    background:#333;
    overflow:hidden;
}

.fill{
    height:100%;
}

.hp .fill{
    width:80%;
    background:#2ecc71;
}

.mp .fill{
    width:70%;
    background:#3498db;
}

/* ======================
   敵
====================== */

.enemy-panel{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.enemy-card{
    padding:10px;

    border:1px solid #555;
    border-radius:12px;

    background:#1b1b1b;

    text-align:center;
}

.enemy-image{
    display: none;
    width:60px;
    height:60px;

    margin:10px auto;

    border-radius:50%;
    background:#555;
}

.enemy-name{
    font-weight:bold;
    margin-bottom:6px;
}

.hp-label{
    font-size:12px;
    margin-bottom:4px;
}

/* ======================
   タイムライン
====================== */

.timeline-panel{
    position:relative;

    height:120px;

    border:1px solid #444;
    border-radius:12px;

    background:#1b1b1b;
}

.timeline-line{
    position:absolute;

    left:16px;
    right:16px;
    top:50%;

    height:2px;

    background:#ddd;
}

.timeline-unit{
    position:absolute;

    transform:translateX(-50%);
}

.timeline-unit.enemy{
    top:10px;
}

.timeline-unit.ally{
    bottom:10px;
}

.timeline-icon{
    width:36px;
    height:36px;

    margin:auto;

    border-radius:8px;
    background:#555;
}

.timeline-name{
    margin-top:4px;
    font-size:12px;
    text-align:center;
}

/* ======================
   ログ
====================== */

.log-panel{
    display: none;
    height:220px;

    overflow-y:auto;

    padding:10px;

    border:1px solid #444;
    border-radius:12px;

    background:#1b1b1b;
}

.log-entry{
    margin-bottom:6px;
}

.enemy-log{
    color:#ff7675;
}

.ally-log{
    color:#74b9ff;
}

.damage-log{
    color:#ffeaa7;
}

/* ======================
   コマンド
====================== */

.command-panel{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.cmd{
    height:60px;

    border:none;
    border-radius:12px;

    color:white;
    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

.attack{background:#c0392b;}
.skill{background:#2980b9;}
.guard{background:#27ae60;}
.item{background:#f39c12;}

</style>
</head>
